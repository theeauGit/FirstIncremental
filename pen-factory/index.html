<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pen Factory</title>
</head>
<body>

    <div class="terminal">
        <p>.</p>
        <p>.</p>
        <p>.</p>
        <p>> <span id="terminal-output">Bienvenue dans la Pen Factory !</span></p>
    </div>

    <h1>Stylos : <span id="pen-count">0</span></h1>
    
    <div>
        <button id="btn-make-pen">Fabriquer 1 Stylo</button>
    </div>

    <div>
        <h2>Actions</h2>
        <hr>
        <p>Argent : <span id="funds">0.00</span> €</p>
        <p>Stylos en stock : <span id="pen-stock">0</span></p>
        <p>Prix : <span id="price">0.25</span></p>
        <button id="btn-raise-price">Augmenter Prix</button>
        <button id="btn-lower-price">Baisser Prix</button>
        <p>Demande public : <span id="public-demand">50</span>%</p>
    </div>

    <div>
        <h2>Ressources</h2>
        <hr>
        <p>Plastique : <span id="plastic">100</span></p>
        <button id="btn-buy-plastic">Acheter Plastique</button>
        <p>Encre : <span id="ink">100</span></p>
        <button id="btn-buy-ink">Acheter Encre</button>
    </div>

    <div class="upgrade1">
        <h2>Améliorations</h2>
        <hr>
        <p>Machine à Stylo : <span id="pen-machine-level">0</span></p>
        <button id="btn-upgrade-pen-machine">Acheter une Machine à Stylo</button>
    </div>

    <script src="js/core/events.js"></script>
    <script src="js/var.js"></script>
    <script src="js/front/rendu.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
